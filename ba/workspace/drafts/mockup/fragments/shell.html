<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOSS — Prototype v0.3</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
/* ===== M3 Design Tokens (primary = Viettel đỏ #EE0033) ===== */
:root{
  --md-primary:#EE0033;--md-on-primary:#fff;--md-primary-container:#ffd9dd;--md-on-primary-container:#410008;
  --md-secondary:#1565C0;--md-secondary-container:#BBDEFB;
  --md-surface:#fdfcfc;--md-surface-container:#f3eded;--md-surface-container-high:#ece6e6;
  --md-on-surface:#1c1b1b;--md-on-surface-variant:#5e5e5e;
  --md-outline:#7a7979;--md-outline-variant:#cecccc;
  --md-error:#ba1a1a;--md-error-container:#ffdad6;
  --md-success:#2E7D32;--md-success-container:#d1e7dd;
  --md-warn:#E65100;--md-warn-container:#fff3cd;
  --md-radius:12px;--md-radius-sm:8px;
  --md-elev1:0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);
  --md-elev2:0 1px 2px rgba(0,0,0,.3),0 2px 6px 2px rgba(0,0,0,.15);
  --dark-bg:#121212;--dark-surface:#1e1e1e;--dark-surface2:#2a2a2a;
  --dark-on-surface:#e0e0e0;--dark-on-variant:#aaa;--dark-outline:#555;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Roboto,'Segoe UI',Arial,sans-serif;background:var(--dark-bg);color:var(--dark-on-surface);font-size:14px;min-height:100vh;}
.ms{font-family:'Material Symbols Outlined';font-size:20px;vertical-align:middle;line-height:1;user-select:none;}

/* ===== Toolbar ===== */
[data-mat="mat-toolbar"]{
  background:var(--dark-surface);color:var(--dark-on-surface);
  display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;
  position:sticky;top:0;z-index:30;border-bottom:1px solid var(--dark-outline);
  box-shadow:var(--md-elev1);
}
[data-mat="mat-toolbar"] .app-title{font-size:18px;font-weight:700;color:var(--md-primary);}
[data-mat="mat-toolbar"] .spacer{flex:1;}
.proto-banner{background:#663c00;color:#ffd591;font-size:11px;padding:3px 10px;border-radius:4px;}

/* ===== Sidenav ===== */
.shell{display:flex;height:calc(100vh - 56px);}
[data-mat="mat-sidenav"]{
  width:56px;background:var(--dark-surface);border-right:1px solid var(--dark-outline);
  display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;overflow:hidden;
  transition:width .2s;
}
[data-mat="mat-sidenav"]:hover,[data-mat="mat-sidenav"].expanded{width:220px;}
[data-mat="mat-sidenav"] .nav-item{
  display:flex;align-items:center;gap:12px;padding:12px;width:100%;
  color:var(--dark-on-variant);cursor:pointer;border-radius:0 28px 28px 0;
  text-decoration:none;white-space:nowrap;overflow:hidden;transition:background .15s;
}
[data-mat="mat-sidenav"] .nav-item:hover{background:var(--dark-surface2);color:var(--dark-on-surface);}
[data-mat="mat-sidenav"] .nav-item.active{background:var(--md-primary-container);color:var(--md-on-primary-container);}
[data-mat="mat-sidenav"] .nav-item .nav-label{font-size:13px;font-weight:500;}

/* ===== Content ===== */
.content{flex:1;overflow:auto;padding:16px;}

/* ===== Screen panels ===== */
.screen{display:none;animation:fadein .2s;}
.screen.active{display:block;}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* ===== Banner ===== */
.banner{background:#663c00;color:#ffd591;border-radius:var(--md-radius-sm);padding:8px 14px;font-size:12px;margin-bottom:14px;display:flex;gap:8px;align-items:center;}

/* ===== mat-card ===== */
[data-mat^="mat-card"]{
  background:var(--dark-surface);border:1px solid var(--dark-outline);
  border-radius:var(--md-radius);padding:16px;margin-bottom:14px;
}
[data-mat^="mat-card"] .card-title{font-size:15px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* ===== Stat chips (KPI row) ===== */
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.kpi{background:var(--dark-surface);border:1px solid var(--dark-outline);border-radius:var(--md-radius);padding:12px 18px;flex:1;min-width:120px;}
.kpi .kpi-val{font-size:26px;font-weight:700;line-height:1.2;}
.kpi .kpi-lbl{font-size:11px;color:var(--dark-on-variant);margin-top:2px;}
.kpi.err{border-color:var(--md-error);} .kpi.err .kpi-val{color:#ff6b6b;}
.kpi.warn{border-color:var(--md-warn);} .kpi.warn .kpi-val{color:#ffb347;}
.kpi.ok{border-color:var(--md-success);} .kpi.ok .kpi-val{color:#69d58f;}

/* ===== Toolbar row (filter strip) ===== */
.tool-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.search-box{display:flex;align-items:center;gap:6px;background:var(--dark-surface2);border:1px solid var(--dark-outline);border-radius:28px;padding:6px 14px;flex:1;max-width:320px;}
.search-box input{background:transparent;border:none;color:var(--dark-on-surface);font:inherit;outline:none;width:100%;}

/* ===== mat-table ===== */
[data-mat^="mat-table"]{width:100%;border-collapse:collapse;}
[data-mat^="mat-table"] th{
  text-align:left;padding:10px 12px;font-weight:500;font-size:12px;
  color:var(--dark-on-variant);border-bottom:1px solid var(--dark-outline);
  background:var(--dark-surface2);position:sticky;top:0;z-index:2;white-space:nowrap;
}
[data-mat^="mat-table"] td{padding:9px 12px;border-bottom:1px solid var(--dark-outline);font-size:13px;white-space:nowrap;}
[data-mat^="mat-table"] tbody tr{cursor:pointer;transition:background .1s;}
[data-mat^="mat-table"] tbody tr:hover{background:var(--dark-surface2);}
.table-wrap{border:1px solid var(--dark-outline);border-radius:var(--md-radius);overflow:auto;}

/* ===== Chips / badges ===== */
[data-mat^="mat-chip"]{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500;}
.chip-red{background:#5c1515;color:#ff9090;border:1px solid #a83232;}
.chip-yellow{background:#5c4800;color:#ffe090;border:1px solid #a87c00;}
.chip-green{background:#0f3d20;color:#69d58f;border:1px solid #1b6e36;}
.chip-blue{background:#0d2f5c;color:#90c4ff;border:1px solid #1a4fa0;}
.chip-grey{background:var(--dark-surface2);color:var(--dark-on-variant);border:1px solid var(--dark-outline);}

/* ===== Alert dots ===== */
.alert-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
.alert-red{background:#ff5252;animation:blink 1.2s infinite;}
.alert-yellow{background:#ffca28;}
.alert-green{background:#69f0ae;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== mat-tab-group ===== */
[data-mat^="mat-tab-group"] .tabs{display:flex;gap:0;border-bottom:2px solid var(--dark-outline);margin-bottom:14px;overflow-x:auto;}
[data-mat^="mat-tab-group"] .tab{padding:10px 18px;cursor:pointer;color:var(--dark-on-variant);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-size:13px;}
[data-mat^="mat-tab-group"] .tab.active{color:var(--md-primary);border-bottom-color:var(--md-primary);font-weight:500;}
[data-mat^="mat-tab-group"] .tab-panel{display:none;}
[data-mat^="mat-tab-group"] .tab-panel.active{display:block;}

/* ===== mat-form-field ===== */
[data-mat*="mat-form-field"]{margin:8px 0;}
[data-mat*="mat-form-field"] label{display:block;font-size:11px;color:var(--dark-on-variant);margin-bottom:3px;}
[data-mat*="mat-form-field"] input,[data-mat*="mat-form-field"] select,[data-mat*="mat-form-field"] textarea{
  width:100%;padding:9px 12px;
  border:1px solid var(--dark-outline);border-radius:var(--md-radius-sm);
  font:inherit;background:var(--dark-surface2);color:var(--dark-on-surface);
}
[data-mat*="mat-form-field"] input:focus,[data-mat*="mat-form-field"] select:focus{
  outline:2px solid var(--md-primary);border-color:var(--md-primary);
}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 14px;}
.form-grid .col2{grid-column:span 2;} .form-grid .full{grid-column:1/-1;}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:9px 20px;font:inherit;font-weight:500;cursor:pointer;border:none;font-size:13px;}
.btn-filled{background:var(--md-primary);color:#fff;}
.btn-filled:hover{opacity:.9;}
.btn-outlined{background:transparent;color:var(--md-primary);border:1px solid var(--md-primary);}
.btn-text{background:transparent;color:var(--md-primary);padding:9px 12px;}
.btn-icon{width:36px;height:36px;border-radius:50%;padding:0;justify-content:center;background:transparent;color:var(--dark-on-variant);cursor:pointer;border:none;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap;}

/* ===== mat-dialog ===== */
[data-mat^="mat-dialog"]{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;}
[data-mat^="mat-dialog"].open{display:flex;}
[data-mat^="mat-dialog"] .panel{background:var(--dark-surface);border-radius:28px;padding:24px;min-width:360px;max-width:600px;width:90vw;box-shadow:var(--md-elev2);max-height:90vh;overflow-y:auto;}
[data-mat^="mat-dialog"] .panel h3{font-size:18px;font-weight:500;margin-bottom:16px;}
[data-mat^="mat-dialog"] .panel .sub{font-size:12px;color:var(--dark-on-variant);margin-bottom:16px;}

/* ===== Progress / timeline ===== */
.timeline{display:flex;gap:0;margin:14px 0;flex-wrap:wrap;}
.t-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:80px;}
.t-node{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid var(--dark-outline);background:var(--dark-surface2);color:var(--dark-on-variant);}
.t-node.done{background:var(--md-success);border-color:var(--md-success);color:#fff;}
.t-node.current{background:var(--md-primary);border-color:var(--md-primary);color:#fff;}
.t-node.pending{border-style:dashed;}
.t-label{font-size:11px;color:var(--dark-on-variant);margin-top:4px;text-align:center;}
.t-line{height:2px;background:var(--dark-outline);flex:1;margin-top:16px;align-self:flex-start;}

/* ===== MEL item ===== */
.mel-item{border:1px solid var(--dark-outline);border-radius:var(--md-radius-sm);padding:12px;margin-bottom:8px;background:var(--dark-surface2);}
.mel-item.critical{border-left:4px solid var(--md-error);}
.mel-item.warn{border-left:4px solid var(--md-warn);}
.mel-item-code{font-size:12px;font-weight:700;color:var(--md-primary);font-family:monospace;}
.mel-item-name{font-size:13px;font-weight:500;margin:2px 0;}
.mel-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.mel-meta .tag{background:var(--dark-surface);border:1px solid var(--dark-outline);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--dark-on-variant);}
.mel-meta .tag.impact{color:#ffb347;border-color:#a87c00;background:#5c4800;}

/* ===== METAR display ===== */
.metar-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
.metar-card{background:var(--dark-surface2);border-radius:var(--md-radius-sm);padding:12px 16px;flex:1;min-width:120px;text-align:center;}
.metar-val{font-size:22px;font-weight:700;}
.metar-lbl{font-size:11px;color:var(--dark-on-variant);margin-top:2px;}
.metar-card.alert .metar-val{color:#ff6b6b;}
.metar-card.warn .metar-val{color:#ffb347;}

/* ===== NOTAM list ===== */
.notam-item{border-left:3px solid var(--dark-outline);padding:8px 12px;margin-bottom:6px;background:var(--dark-surface2);border-radius:0 var(--md-radius-sm) var(--md-radius-sm) 0;}
.notam-item.urgent{border-left-color:#ff5252;}
.notam-code{font-family:monospace;font-size:11px;font-weight:700;color:var(--md-primary);}
.notam-text{font-size:12px;margin-top:3px;}

/* ===== History list ===== */
.hist-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--dark-outline);}
.hist-item:last-child{border:none;}
.hist-time{font-size:11px;color:var(--dark-on-variant);min-width:100px;}
.hist-desc{font-size:13px;}

/* ===== Tooltip (hover info) ===== */
.has-tooltip{position:relative;}
.has-tooltip .tooltip{
  display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;
  white-space:nowrap;z-index:50;pointer-events:none;
}
.has-tooltip:hover .tooltip{display:block;}

/* ===== Overlay panel (right detail) ===== */
.detail-overlay{position:fixed;right:0;top:56px;bottom:0;width:460px;background:var(--dark-surface);border-left:1px solid var(--dark-outline);z-index:40;transform:translateX(100%);transition:transform .25s;overflow-y:auto;padding:16px;}
.detail-overlay.open{transform:translateX(0);}
.overlay-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;position:sticky;top:0;background:var(--dark-surface);padding-bottom:10px;border-bottom:1px solid var(--dark-outline);}
.overlay-header h3{font-size:16px;font-weight:500;flex:1;}

/* ===== Legend ===== */
.legend{margin-top:24px;font-size:12px;}
.legend table{width:100%;border-collapse:collapse;}
.legend th,.legend td{border:1px solid var(--dark-outline);padding:6px 10px;text-align:left;}
.legend th{background:var(--dark-surface2);}
.src{color:var(--dark-on-variant);font-size:11px;}

@media(max-width:768px){.shell{flex-direction:column;}[data-mat="mat-sidenav"]{width:100%;flex-direction:row;}
.form-grid{grid-template-columns:1fr;}.kpi-row{flex-direction:column;}}
/* ===INJECT_SCREEN_CSS=== */
</style></head><body>

<div class="content">

<!-- ===INJECT_DIALOGS=== -->
<script>
// ---- Clock ----
function updateClock(){
  const now=new Date();
  const h=String(now.getUTCHours()).padStart(2,'0');
  const m=String(now.getUTCMinutes()).padStart(2,'0');
  document.getElementById('clock-display').textContent=h+':'+m+' UTC';
}
setInterval(updateClock,30000);

// ---- Navigation ----
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('[data-mat="mat-sidenav"] .nav-item').forEach(a=>a.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
}
function showScreenDirect(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('[data-mat="mat-sidenav"] .nav-item').forEach(a=>a.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelector(`[onclick="showScreen('${name}')"]`).classList.add('active');
}
updateClock();
/* ===INJECT_SCREEN_JS=== */
</script></body></html>
